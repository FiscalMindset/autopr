id: validate_input
namespace: system.autopr
description: "Validates the incoming orchestration payload and normalizes it for downstream tasks."

inputs:
  - id: run_id
    type: STRING
    required: true
  - id: source
    type: STRING
    required: true
  - id: project
    type: STRING
    required: true
  - id: raw_update
    type: STRING
    defaults: ""
  - id: author
    type: STRING
    required: true
  - id: goal
    type: STRING
    defaults: "general_update"
  - id: dry_run
    type: STRING
    defaults: "true"
  - id: github_username
    type: STRING
    defaults: ""
  - id: github_token
    type: STRING
    defaults: ""
  - id: selected_repo_json
    type: STRING
    defaults: "{}"
  - id: selected_commit_json
    type: STRING
    defaults: "{}"
  - id: selected_pr_json
    type: STRING
    defaults: "{}"
  - id: github_context_json
    type: STRING
    defaults: "{}"
  - id: style_analysis_json
    type: STRING
    defaults: "{}"
  - id: use_style_profile
    type: STRING
    defaults: "false"
  - id: delivery_webhook_url
    type: STRING
    defaults: ""
  - id: input_source
    type: STRING
    defaults: "github_commit"

tasks:
  - id: validate_task
    type: io.kestra.plugin.scripts.python.Script
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    warningOnStdErr: false
    script: |
      import json

      def parse_json(value, fallback):
          try:
              parsed = json.loads(value)
              if isinstance(parsed, str):
                  try:
                      return json.loads(parsed)
                  except Exception:
                      return parsed
              return parsed
          except Exception:
              return fallback

      run_id = r'''{{ inputs.run_id }}'''
      source = r'''{{ inputs.source }}'''
      project = r'''{{ inputs.project }}'''.strip()
      raw_update = r'''{{ inputs.raw_update }}'''.strip()
      author = r'''{{ inputs.author }}'''.strip()
      goal = r'''{{ inputs.goal }}'''.strip() or "general_update"
      dry_run = r'''{{ inputs.dry_run }}'''.lower() == "true"
      github_username = r'''{{ inputs.github_username }}'''.strip()
      selected_repo = parse_json(r'''{{ inputs.selected_repo_json }}''', {})
      selected_commit = parse_json(r'''{{ inputs.selected_commit_json }}''', {})
      selected_pr = parse_json(r'''{{ inputs.selected_pr_json }}''', {})
      github_context = parse_json(r'''{{ inputs.github_context_json }}''', {})
      style_profile = parse_json(r'''{{ inputs.style_analysis_json }}''', {})
      use_style_profile = r'''{{ inputs.use_style_profile }}'''.lower() == "true"
      delivery_webhook_url = r'''{{ inputs.delivery_webhook_url }}'''.strip()
      input_source = r'''{{ inputs.input_source }}'''.strip() or source

      warnings = []
      if not project:
          raise ValueError("project is required")
      if not author:
          raise ValueError("author is required")
      if not raw_update:
          warnings.append("raw_update was empty. Downstream stages will derive fallback copy from GitHub context.")
      if not selected_repo:
          warnings.append("No selected repository payload was provided.")
      if not selected_commit and not selected_pr:
          warnings.append("No commit or PR selection was provided.")
      if not github_username:
          warnings.append("GitHub username is missing; authenticated repo enumeration may be limited.")
      if not dry_run and not delivery_webhook_url:
          warnings.append("Live mode requested without a delivery webhook URL. Delivery tasks will fall back to adapter-missing status.")
      if use_style_profile and not style_profile:
          warnings.append("Style reuse was enabled but no style profile was supplied.")

      print(f"Validated {run_id} from {source} for project {project}.")
      if warnings:
          print("Warnings: " + "; ".join(warnings))
